<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valura AI — Multi-Agent Financial Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
  />
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #141414;
      --panel-2: #1a1a1a;
      --border: #2a2a2a;
      --text: #e6e6e6;
      --muted: #8a8a8a;
      --accent: #00d4aa;
      --accent-dim: rgba(0, 212, 170, 0.18);
      --green: #34d399;
      --red: #ef4444;
      --amber: #f59e0b;
      --grey: #4b5563;
      --user-bubble: #1f2a37;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      height: 100%;
    }

    body {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 16px;
      padding: 16px;
      min-height: 100vh;
    }

    @media (max-width: 960px) {
      body { grid-template-columns: 1fr; }
      .pipeline { order: 2; }
    }

    /* ---------- Cards ---------- */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    h1 .accent { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    /* ---------- Chat layout ---------- */
    .chat {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
      min-height: calc(100vh - 32px);
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    select, button, textarea, input {
      font: inherit;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      outline: none;
    }

    select { min-width: 240px; }
    select:focus, textarea:focus, input:focus {
      border-color: var(--accent);
    }

    button {
      cursor: pointer;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      font-weight: 600;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .messages {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 4px;
    }

    .msg {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 12px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border: 1px solid #243341;
      border-radius: 12px 12px 4px 12px;
    }

    .msg.ai {
      align-self: flex-start;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px 12px 12px 4px;
    }

    .msg.error {
      align-self: flex-start;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #ffd9d9;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(0, 212, 170, 0.4);
      border-radius: 999px;
      padding: 2px 8px;
      margin-bottom: 6px;
    }

    /* Rich result block under each AI message */
    .result-block {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(0, 212, 170, 0.04);
      border: 1px solid rgba(0, 212, 170, 0.18);
      border-radius: 8px;
      display: grid;
      gap: 10px;
    }
    .result-block .rb-section { display: grid; gap: 4px; }
    .result-block .rb-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 8px;
    }
    .stat {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
    }
    .stat .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat .stat-value {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 13px;
      font-weight: 600;
      margin-top: 2px;
    }
    .stat .stat-value.up { color: var(--green); }
    .stat .stat-value.down { color: var(--red); }
    .stat .stat-value.warn { color: var(--amber); }
    .obs-list { display: grid; gap: 4px; padding: 0; margin: 0; list-style: none; }
    .obs-list li {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 8px;
      font-size: 12.5px;
      align-items: start;
    }
    .obs-tag {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 4px;
      border-radius: 4px;
      text-align: center;
      justify-self: start;
    }
    .obs-tag.info { background: rgba(0, 212, 170, 0.15); color: var(--accent); }
    .obs-tag.warning { background: rgba(245, 158, 11, 0.18); color: var(--amber); }
    .obs-tag.critical { background: rgba(239, 68, 68, 0.18); color: var(--red); }
    .news-item {
      font-size: 12.5px;
      padding: 4px 0;
      border-bottom: 1px dashed var(--border);
    }
    .news-item:last-child { border-bottom: none; }
    .news-item a { color: var(--accent); text-decoration: none; }
    .news-item a:hover { text-decoration: underline; }
    .sentiment-pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      margin-right: 6px;
    }
    .sentiment-pill.positive { background: rgba(52, 211, 153, 0.18); color: var(--green); }
    .sentiment-pill.negative { background: rgba(239, 68, 68, 0.18); color: var(--red); }
    .sentiment-pill.neutral { background: rgba(139, 148, 158, 0.2); color: #9ca3af; }
    .report-preview {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11.5px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .file-link {
      display: inline-block;
      background: var(--panel-2);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11.5px;
      text-decoration: none;
    }
    .file-link:hover { background: var(--accent-dim); }
    table.snapshot-tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }
    table.snapshot-tbl th, table.snapshot-tbl td {
      padding: 6px 8px;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    table.snapshot-tbl th { color: var(--muted); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: 0.04em; }
    table.snapshot-tbl td:first-child, table.snapshot-tbl th:first-child { text-align: left; }

    .typing-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-left: 2px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 60%, 100% { opacity: 0.2; }
      30% { opacity: 1; }
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }
    textarea {
      resize: none;
      min-height: 44px;
      max-height: 160px;
      width: 100%;
    }

    .custom-block {
      display: none;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    .custom-block.show { display: flex; }
    .custom-block textarea {
      min-height: 110px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 12px;
    }
    .hint { color: var(--muted); font-size: 11px; }

    /* ---------- Pipeline ---------- */
    .pipeline {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 6px 2px;
    }

    .agent-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 10px;
      align-items: start;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .agent-card.running {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    .agent-card.done { border-color: var(--green); }
    .agent-card.error { border-color: var(--red); }
    .agent-card.stub { opacity: 0.55; }

    .agent-name {
      font-weight: 600;
      font-size: 13px;
    }
    .agent-desc {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 11px;
    }
    .agent-meta {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--grey);
      align-self: center;
    }
    .status-dot.running {
      background: var(--accent);
      box-shadow: 0 0 0 0 var(--accent);
      animation: pulse 1.2s infinite;
    }
    .status-dot.done { background: var(--green); }
    .status-dot.error { background: var(--red); }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 212, 170, 0.7); }
      70% { box-shadow: 0 0 0 8px rgba(0, 212, 170, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 212, 170, 0); }
    }

    .mcp-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
    }

    .log-line {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      color: var(--muted);
      padding: 6px 8px;
      border-left: 2px solid var(--border);
      margin-bottom: 4px;
    }
    .log-line.parallel {
      color: var(--accent);
      border-left-color: var(--accent);
    }

    /* ---------- Scrollbar ---------- */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
  </style>
</head>
<body>
  <!-- ============== LEFT: CHAT ============== -->
  <main class="chat panel">
    <div class="header-row">
      <div>
        <h1><span class="accent">Valura</span> AI</h1>
        <div class="subtitle">Multi-Agent Financial Intelligence</div>
      </div>
      <div class="toolbar">
        <select id="userSelect" aria-label="User profile"></select>
        <button class="ghost" id="customToggle" type="button">Custom</button>
        <button class="ghost" id="clearBtn" type="button">Clear</button>
      </div>
    </div>

    <div class="custom-block" id="customBlock">
      <div class="hint">Paste a custom user profile JSON (must include <code>user_id</code> and <code>positions</code>).</div>
      <textarea id="customJson" spellcheck="false" placeholder='{"user_id":"usr_custom","name":"Custom","age":30,"country":"US","base_currency":"USD","kyc":{"status":"verified"},"risk_profile":"moderate","positions":[],"preferences":{}}'></textarea>
    </div>

    <div class="messages" id="messages" aria-live="polite"></div>

    <div class="input-row">
      <textarea id="queryInput" rows="1" placeholder="Ask about your portfolio, a stock, risk, news, or request a report..."></textarea>
      <button id="sendBtn" type="button">Send</button>
    </div>
  </main>

  <!-- ============== RIGHT: PIPELINE ============== -->
  <aside class="pipeline panel">
    <div>
      <div class="section-title">Agent Ecosystem</div>
      <div id="agentCards"></div>
    </div>

    <div>
      <div class="section-title">MCP Servers</div>
      <div id="mcpRows"></div>
    </div>

    <div>
      <div class="section-title">Parallel Execution Log</div>
      <div id="execLog"></div>
    </div>
  </aside>

  <script>
    // ===========================================================
    // Config + state
    // ===========================================================
    const SESSION_ID = 'ui-' + Math.random().toString(36).slice(2, 10);
    const MAX_MESSAGES = 10;
    const PRIMARY_AGENTS = ['portfolio_health', 'market_research', 'risk_analysis', 'financial_news', 'report_generator'];

    const PRETTY = {
      portfolio_health: 'Portfolio Health',
      market_research: 'Market Research',
      risk_analysis: 'Risk Analysis',
      financial_news: 'News',
      report_generator: 'Reports',
    };

    const MCP_USAGE = {
      portfolio_health: ['yfinance_mcp'],
      market_research: ['yfinance_mcp'],
      risk_analysis: ['yfinance_mcp'],
      financial_news: ['web_search_mcp', 'yfinance_mcp'],
      report_generator: ['report_mcp', 'yfinance_mcp'],
    };

    let userProfiles = [];
    const messages = [];

    // ===========================================================
    // DOM lookups
    // ===========================================================
    const userSelect = document.getElementById('userSelect');
    const customToggle = document.getElementById('customToggle');
    const customBlock = document.getElementById('customBlock');
    const customJson = document.getElementById('customJson');
    const messagesEl = document.getElementById('messages');
    const queryInput = document.getElementById('queryInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const agentCardsEl = document.getElementById('agentCards');
    const mcpRowsEl = document.getElementById('mcpRows');
    const execLogEl = document.getElementById('execLog');

    // ===========================================================
    // Init
    // ===========================================================
    init().catch(err => console.error('init failed', err));

    async function init() {
      renderAgentCards([]);
      renderMcpRows();
      await Promise.all([loadUsers(), loadAgents()]);
      pushLog('Ready. Pick a profile and send a question.', false);
    }

    async function loadAgents() {
      try {
        const res = await fetch('/agents');
        const data = await res.json();
        renderAgentCards(data.agents || []);
      } catch (e) {
        renderAgentCards([]);
      }
    }

    async function loadUsers() {
      const fallback = [
        { id: 'marcus', label: 'Marcus — Concentrated', profile: profileMarcus() },
        { id: 'alex', label: 'Alex — Aggressive', profile: profileAlex() },
        { id: 'jamie', label: 'Jamie — New Investor', profile: profileJamie() },
      ];
      try {
        const res = await fetch('/users');
        const data = await res.json();
        const fromServer = (data.users || []).filter(u => u.profile && u.profile.user_id);
        userProfiles = fromServer.length ? fromServer : fallback;
      } catch (e) {
        userProfiles = fallback;
      }
      userProfiles.push({ id: 'custom', label: 'Custom — paste JSON below', profile: null });
      userSelect.innerHTML = userProfiles
        .map((u, i) => `<option value="${i}">${escapeHtml(u.label)}</option>`)
        .join('');
      userSelect.addEventListener('change', () => {
        customBlock.classList.toggle('show', userSelect.value === String(userProfiles.length - 1));
      });
    }

    // ===========================================================
    // Renderers — agent cards / MCP rows
    // ===========================================================
    function renderAgentCards(serverAgents) {
      const seen = new Map();
      for (const a of serverAgents) seen.set(a.name, a);
      // Always render the 5 primary cards (in the requested order),
      // even when /agents is unreachable.
      const ordered = [
        ...PRIMARY_AGENTS.map(n => seen.get(n) || { name: n, status: 'implemented' }),
        ...serverAgents.filter(a => !PRIMARY_AGENTS.includes(a.name)),
      ];
      agentCardsEl.innerHTML = ordered
        .map(a => agentCardHtml(a))
        .join('');
    }

    function agentCardHtml(a) {
      const isStub = a.status === 'stub';
      const desc = a.description || PRETTY[a.name] || a.name;
      const parallel = (a.parallel_with || []).join(', ');
      return `
        <div class="agent-card ${isStub ? 'stub' : ''}" data-agent="${a.name}">
          <div class="agent-name">${escapeHtml(PRETTY[a.name] || a.name)}</div>
          <div class="status-dot" data-status></div>
          <div class="agent-desc">${escapeHtml(desc)}</div>
          <div class="agent-meta">
            <span data-state>${isStub ? 'stub' : 'idle'}</span>
            <span data-time>—</span>
            ${parallel ? `<span title="parallel with">∥ ${escapeHtml(parallel)}</span>` : ''}
          </div>
        </div>`;
    }

    function renderMcpRows() {
      const servers = ['yfinance_mcp', 'web_search_mcp', 'report_mcp'];
      mcpRowsEl.innerHTML = servers
        .map(
          s => `
          <div class="mcp-row" data-mcp="${s}">
            <span><span class="status-dot done" style="display:inline-block;margin-right:8px;"></span>${s}</span>
            <span data-last style="color:var(--muted);font-family:'JetBrains Mono',ui-monospace,monospace;">never</span>
          </div>`
        )
        .join('');
    }

    function setAgentState(agent, state, ms) {
      const card = agentCardsEl.querySelector(`[data-agent="${agent}"]`);
      if (!card) return;
      card.classList.remove('running', 'done', 'error');
      const dot = card.querySelector('[data-status]');
      const stateEl = card.querySelector('[data-state]');
      const timeEl = card.querySelector('[data-time]');
      dot.classList.remove('running', 'done', 'error');
      if (state) {
        card.classList.add(state);
        dot.classList.add(state);
        stateEl.textContent = state;
      } else {
        // explicit reset to idle (e.g. agent we expected didn't actually fire)
        stateEl.textContent = 'idle';
      }
      if (typeof ms === 'number') {
        timeEl.textContent = ms < 1000 ? `${Math.round(ms)} ms` : `${(ms / 1000).toFixed(2)} s`;
      }
    }

    function resetAgentStates() {
      for (const card of agentCardsEl.querySelectorAll('.agent-card')) {
        if (card.classList.contains('stub')) continue;
        card.classList.remove('running', 'done', 'error');
        const dot = card.querySelector('[data-status]');
        if (dot) dot.classList.remove('running', 'done', 'error');
        const stateEl = card.querySelector('[data-state]');
        if (stateEl) stateEl.textContent = 'idle';
      }
    }

    function bumpMcpServers(serverIds) {
      const ts = nowHms();
      for (const id of new Set(serverIds)) {
        const row = mcpRowsEl.querySelector(`[data-mcp="${id}"] [data-last]`);
        if (row) row.textContent = ts;
      }
    }

    function pushLog(text, parallel) {
      const div = document.createElement('div');
      div.className = 'log-line' + (parallel ? ' parallel' : '');
      div.textContent = `[${nowHms()}] ${text}`;
      execLogEl.prepend(div);
      while (execLogEl.children.length > 12) execLogEl.removeChild(execLogEl.lastChild);
    }

    // ===========================================================
    // Renderers — chat
    // ===========================================================
    function appendUserMessage(text) {
      const el = document.createElement('div');
      el.className = 'msg user';
      el.textContent = text;
      messagesEl.appendChild(el);
      trimHistory();
      scrollChat();
    }

    function appendAiMessage() {
      const el = document.createElement('div');
      el.className = 'msg ai';
      el.innerHTML = `
        <div class="badge" data-badge>thinking</div>
        <span data-body></span>
        <span class="typing-dot" data-dot></span>
        <div data-rich></div>`;
      messagesEl.appendChild(el);
      trimHistory();
      scrollChat();
      return el;
    }

    function appendErrorMessage(text) {
      const el = document.createElement('div');
      el.className = 'msg error';
      el.textContent = text;
      messagesEl.appendChild(el);
      trimHistory();
      scrollChat();
    }

    function trimHistory() {
      while (messagesEl.children.length > MAX_MESSAGES * 2) {
        messagesEl.removeChild(messagesEl.firstChild);
      }
    }

    function scrollChat() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ===========================================================
    // Send + SSE parsing
    // ===========================================================
    sendBtn.addEventListener('click', sendQuery);
    clearBtn.addEventListener('click', () => {
      messagesEl.innerHTML = '';
      execLogEl.innerHTML = '';
      resetAgentStates();
    });
    customToggle.addEventListener('click', () => {
      customBlock.classList.toggle('show');
    });
    queryInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuery();
      }
    });

    function pickUserProfile() {
      const idx = parseInt(userSelect.value, 10);
      const u = userProfiles[idx];
      if (!u || !u.profile) {
        try {
          const parsed = JSON.parse(customJson.value || '{}');
          if (!parsed.user_id) throw new Error('user_id required');
          return parsed;
        } catch (e) {
          throw new Error('Invalid custom profile JSON: ' + e.message);
        }
      }
      return u.profile;
    }

    async function sendQuery() {
      const query = queryInput.value.trim();
      if (!query || sendBtn.disabled) return;

      let profile;
      try {
        profile = pickUserProfile();
      } catch (e) {
        appendErrorMessage(e.message);
        return;
      }

      appendUserMessage(query);
      queryInput.value = '';
      const aiBubble = appendAiMessage();
      const bodyEl = aiBubble.querySelector('[data-body]');
      const badgeEl = aiBubble.querySelector('[data-badge]');
      const dotEl = aiBubble.querySelector('[data-dot]');

      sendBtn.disabled = true;
      resetAgentStates();
      const expected = predictAgents(query);
      for (const a of expected) setAgentState(a, 'running');
      if (expected.length) pushLog(`Dispatching to ${expected.join(' + ')}…`, expected.length > 1);
      else pushLog('Dispatching…', false);
      const reqStart = performance.now();
      let sawResult = false;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Accept: 'text/event-stream' },
          body: JSON.stringify({ query, session_id: SESSION_ID, user: profile }),
        });
        if (!res.ok || !res.body) {
          throw new Error(`HTTP ${res.status}`);
        }

        await consumeSse(res.body, {
          onDelta: (chunk) => {
            bodyEl.textContent += chunk;
            scrollChat();
          },
          onResult: (jsonStr) => {
            sawResult = true;
            handleResult(jsonStr, aiBubble, badgeEl, reqStart, expected);
          },
          onError: (jsonStr) => {
            const parsed = safeJson(jsonStr);
            const m = (parsed && parsed.message) || jsonStr || 'unknown error';
            appendErrorMessage(m);
            badgeEl.textContent = 'error';
            for (const a of expected) setAgentState(a, null);
          },
          onDone: () => {
            dotEl.remove();
            if (!sawResult) {
              // Safety-block path: only delta + done, no result event.
              badgeEl.textContent = 'safety';
              badgeEl.style.color = 'var(--red)';
              badgeEl.style.background = 'rgba(239, 68, 68, 0.12)';
              badgeEl.style.borderColor = 'rgba(239, 68, 68, 0.4)';
              for (const a of expected) setAgentState(a, null);
              pushLog(`safety guard blocked the query (${(performance.now() - reqStart | 0)} ms)`, false);
            }
          },
        });
      } catch (e) {
        appendErrorMessage('Network error: ' + e.message);
        dotEl.remove();
        for (const a of expected) setAgentState(a, 'error');
      } finally {
        sendBtn.disabled = false;
        // Deliberately do NOT resetAgentStates() — leaving the done/error
        // state visible so the user sees the most recent run on the cards.
      }
    }

    /**
     * Heuristic prediction of which agents the orchestrator will fire.
     * Used purely for the running-glow UX while we wait for the result event.
     * If the actual `result` event reports a different set, we reconcile in handleResult().
     */
    function predictAgents(query) {
      const q = query.toLowerCase();
      const has = (...kws) => kws.some(k => q.includes(k));

      // Safety blocks — no agents fire
      if (has('insider', 'pump and dump', 'manipulate', 'launder', 'guaranteed return')) {
        return [];
      }
      // Reports
      if (has('report', 'pdf', 'export', 'generate a report', 'create a report')) {
        return ['report_generator', 'portfolio_health'];
      }
      // Risk
      if (has('risk', 'stress test', 'var', 'drawdown', 'what if', 'crash', 'tail', 'worst case')) {
        return ['risk_analysis', 'portfolio_health', 'financial_news'];
      }
      // Market research (single ticker / compare)
      if (has('price', 'compare', 'tell me about', 'how is ', 'how are ', 'news on', 'stock', 'shares')) {
        return ['market_research', 'financial_news'];
      }
      // Portfolio health (default for portfolio queries)
      if (has('portfolio', 'holdings', 'diversified', 'concentration', 'positions', 'beating')) {
        return ['portfolio_health', 'risk_analysis', 'financial_news'];
      }
      // Fallback — light up nothing for general queries
      return [];
    }

    /**
     * Parse a stream of SSE-style frames separated by blank lines.
     * sse-starlette emits CRLF (`\r\n\r\n`); the spec also allows LF (`\n\n`)
     * and bare CR (`\r\r`). We normalise CR to LF before scanning so a single
     * indexOf('\n\n') handles every case.
     */
    async function consumeSse(stream, handlers) {
      const reader = stream.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true }).replace(/\r\n?/g, '\n');

        let sep;
        while ((sep = buffer.indexOf('\n\n')) >= 0) {
          const frame = buffer.slice(0, sep);
          buffer = buffer.slice(sep + 2);
          handleFrame(frame, handlers);
        }
      }
      if (buffer.trim()) handleFrame(buffer, handlers);
    }

    function handleFrame(frame, h) {
      let event = 'message';
      const dataLines = [];
      for (const raw of frame.split('\n')) {
        const line = raw.replace(/\r$/, '');
        if (!line || line.startsWith(':')) continue;
        if (line.startsWith('event:')) event = line.slice(6).trim();
        else if (line.startsWith('data:')) dataLines.push(line.slice(5).trimStart());
      }
      const data = dataLines.join('\n');
      if (event === 'delta' && h.onDelta) h.onDelta(data);
      else if (event === 'result' && h.onResult) h.onResult(data);
      else if (event === 'error' && h.onError) h.onError(data);
      else if (event === 'done' && h.onDone) h.onDone();
    }

    function handleResult(jsonStr, aiBubble, badgeEl, reqStart, expected) {
      const parsed = safeJson(jsonStr);
      if (!parsed) return;

      const elapsedMs = Math.round(performance.now() - reqStart);
      const primary = parsed.agent || 'general_query';
      badgeEl.textContent = (PRETTY[primary] || primary).replace('_', ' ');

      const ran = inferAgentsRan(parsed);
      const ranSet = new Set(ran);

      // Reconcile: agents we predicted but didn't actually run → revert to idle.
      // Agents that did run → mark done with shared elapsed.
      for (const a of (expected || [])) {
        if (!ranSet.has(a)) setAgentState(a, null);
      }
      // Per-agent timing isn't streamed; share request elapsed across siblings as a UX cue.
      const perAgent = ran.length ? Math.round(elapsedMs / ran.length) : elapsedMs;
      for (const a of ran) setAgentState(a, 'done', perAgent);

      const mcpHit = new Set();
      for (const a of ran) for (const m of MCP_USAGE[a] || []) mcpHit.add(m);
      bumpMcpServers([...mcpHit]);

      if (ran.length > 1) {
        pushLog(`${ran.join(' + ')} ran in parallel (${(elapsedMs / 1000).toFixed(2)}s)`, true);
      } else {
        pushLog(`${ran[0] || primary} completed in ${(elapsedMs / 1000).toFixed(2)}s`, false);
      }

      // Render the rich result block under the chat bubble
      const richEl = aiBubble.querySelector('[data-rich]');
      if (richEl) {
        richEl.innerHTML = renderRichResult(parsed);
        scrollChat();
      }
    }

    /**
     * Build the structured result panel under the AI message.
     * Different layouts per agent — pulls the actual numbers/data from parsed.result.
     */
    function renderRichResult(parsed) {
      const r = parsed.result || {};
      if (!r || typeof r !== 'object') return '';

      const sections = [];
      const ph = r.portfolio_health;
      const ra = r.risk_analysis;
      const mr = r.market_research;
      const news = r.market_news;
      const report = r.report;

      if (ph && ph.performance) sections.push(renderPortfolioBlock(ph));
      if (mr) sections.push(renderMarketBlock(mr));
      if (ra && (ra.var || ra.stress_tests)) sections.push(renderRiskBlock(ra));
      if (news && (news.articles || news.total_results)) sections.push(renderNewsBlock(news));
      if (report) sections.push(renderReportBlock(report, r.report_type));

      if (!sections.length) return '';
      return `<div class="result-block">${sections.join('')}</div>`;
    }

    function renderPortfolioBlock(ph) {
      const perf = ph.performance || {};
      const conc = ph.concentration_risk || {};
      const bench = ph.benchmark_comparison || {};
      const obs = ph.observations || [];

      const stat = (label, val, cls = '') =>
        `<div class="stat"><div class="stat-label">${escapeHtml(label)}</div>` +
        `<div class="stat-value ${cls}">${escapeHtml(val)}</div></div>`;

      const trClass = (perf.total_return_pct || 0) >= 0 ? 'up' : 'down';
      const alphaClass = (bench.alpha_pct || 0) >= 0 ? 'up' : 'down';
      const flag = (conc.flag || 'low').toLowerCase();
      const flagClass = flag === 'high' ? 'down' : flag === 'medium' ? 'warn' : 'up';

      const stats = [
        stat('Value', fmtMoney(perf.current_value_total)),
        stat('Total return', fmtPct(perf.total_return_pct), trClass),
        stat(`vs ${bench.benchmark || 'bench'}`, fmtPct(bench.benchmark_return_pct)),
        stat('Alpha', fmtPct(bench.alpha_pct), alphaClass),
        stat('Top holding', fmtPct(conc.top_position_pct, false)),
        stat('Concentration', flag.toUpperCase(), flagClass),
      ].join('');

      return `
        <div class="rb-section">
          <div class="rb-title">Portfolio Health</div>
          <div class="stat-grid">${stats}</div>
          ${renderObservations(obs)}
        </div>`;
    }

    function renderMarketBlock(mr) {
      const snaps = mr.snapshots || [];
      const obs = mr.observations || [];
      const comp = mr.comparison_note;

      let table = '';
      if (snaps.length) {
        const rows = snaps.map(s => {
          const dc = s.day_change_pct;
          const cls = (dc || 0) >= 0 ? 'up' : 'down';
          return `<tr>
            <td><strong>${escapeHtml(s.ticker)}</strong></td>
            <td>${escapeHtml(s.currency || '')} ${fmtNum(s.current_price)}</td>
            <td class="${cls}" style="color:${cls === 'up' ? 'var(--green)' : 'var(--red)'}">${fmtPct(dc)}</td>
            <td>${fmtNum(s.fifty_two_week_high)}</td>
            <td>${fmtNum(s.fifty_two_week_low)}</td>
            <td>${fmtPct(s.distance_from_52w_high_pct, false)}</td>
          </tr>`;
        }).join('');
        table = `<table class="snapshot-tbl">
          <thead><tr><th>Ticker</th><th>Price</th><th>Day %</th><th>52W High</th><th>52W Low</th><th>Off High</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      }
      const compHtml = comp ? `<div style="font-size:12.5px;font-style:italic;color:var(--muted);">${escapeHtml(comp)}</div>` : '';

      return `
        <div class="rb-section">
          <div class="rb-title">Market Research</div>
          ${table}
          ${compHtml}
          ${renderObservations(obs)}
        </div>`;
    }

    function renderRiskBlock(ra) {
      const v = ra.var || {};
      const stress = ra.stress_tests || [];
      const obs = ra.observations || [];

      const stat = (label, val, cls = '') =>
        `<div class="stat"><div class="stat-label">${escapeHtml(label)}</div>` +
        `<div class="stat-value ${cls}">${escapeHtml(val)}</div></div>`;

      const stats = [
        stat('VaR 95% (1d)', fmtMoney(v.one_day_95), 'warn'),
        stat('VaR 99% (1d)', fmtMoney(v.one_day_99), 'down'),
        stat('Sharpe', fmtNum(ra.sharpe_ratio_annualised)),
        stat('Max DD', fmtPct(ra.max_drawdown_pct), 'down'),
      ].join('');

      let stressHtml = '';
      if (stress.length) {
        const rows = stress.slice(0, 6).map(s => {
          return `<tr>
            <td>${escapeHtml(s.scenario || '')}</td>
            <td style="color:var(--red);">${fmtPct(s.market_decline_pct)}</td>
            <td style="color:var(--red);">${fmtMoney(s.portfolio_loss_usd)}</td>
            <td>${fmtMoney(s.surviving_value)}</td>
          </tr>`;
        }).join('');
        stressHtml = `<table class="snapshot-tbl">
          <thead><tr><th>Scenario</th><th>Market</th><th>Loss</th><th>Surviving</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      }

      return `
        <div class="rb-section">
          <div class="rb-title">Risk Analysis</div>
          <div class="stat-grid">${stats}</div>
          ${stressHtml}
          ${renderObservations(obs)}
        </div>`;
    }

    function renderNewsBlock(news) {
      const articles = news.articles || [];
      const counts = news.sentiment_counts || {};
      const summary = news.summary;

      if (!articles.length && !summary) return '';

      const summaryHtml = summary ? `<div style="font-size:12.5px;color:var(--text);">${escapeHtml(summary)}</div>` : '';
      const items = articles.slice(0, 5).map(a => {
        const sent = a.sentiment || 'neutral';
        const title = a.title || '(untitled)';
        const url = a.url || '#';
        return `<div class="news-item">
          <span class="sentiment-pill ${sent}">${sent}</span>
          <a href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(title)}</a>
        </div>`;
      }).join('') || '<div style="font-size:12px;color:var(--muted);">No headlines returned (likely rate-limit on the free DDG endpoint).</div>';

      const countLine = `<div style="font-size:11px;color:var(--muted);">
        ${news.total_results || articles.length} articles —
        <span class="sentiment-pill positive">${counts.positive || 0}</span>
        <span class="sentiment-pill neutral">${counts.neutral || 0}</span>
        <span class="sentiment-pill negative">${counts.negative || 0}</span>
      </div>`;

      return `
        <div class="rb-section">
          <div class="rb-title">News</div>
          ${countLine}
          ${summaryHtml}
          ${items}
        </div>`;
    }

    function renderReportBlock(report, reportType) {
      const fname = report.filename || '';
      const path = report.file_path || '';
      const content = report.content || '';
      const fmt = report.format || 'markdown';

      const preview = content
        ? `<div class="report-preview">${escapeHtml(content.slice(0, 1200))}${content.length > 1200 ? '\n\n...(truncated)' : ''}</div>`
        : '';

      const link = fname
        ? `<a class="file-link" href="/reports/${encodeURIComponent(fname)}" target="_blank">📄 ${escapeHtml(fname)}</a>`
        : '';
      const localPath = path ? `<div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',ui-monospace,monospace;">${escapeHtml(path)}</div>` : '';

      return `
        <div class="rb-section">
          <div class="rb-title">${escapeHtml((reportType || 'report').toUpperCase())} REPORT — ${escapeHtml(fmt.toUpperCase())}</div>
          ${link}
          ${localPath}
          ${preview}
        </div>`;
    }

    function renderObservations(obs) {
      if (!obs || !obs.length) return '';
      const items = obs.slice(0, 5).map(o => {
        const sev = (o.severity || 'info').toLowerCase();
        return `<li><span class="obs-tag ${sev}">${sev}</span><span>${escapeHtml(o.text || '')}</span></li>`;
      }).join('');
      return `<ul class="obs-list">${items}</ul>`;
    }

    function fmtMoney(v) {
      if (v == null || isNaN(v)) return '—';
      const n = Number(v);
      const abs = Math.abs(n);
      if (abs >= 1e9) return `$${(n / 1e9).toFixed(2)}B`;
      if (abs >= 1e6) return `$${(n / 1e6).toFixed(2)}M`;
      return `$${n.toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
    }
    function fmtPct(v, signed = true) {
      if (v == null || isNaN(v)) return '—';
      const n = Number(v);
      const sign = signed && n > 0 ? '+' : '';
      return `${sign}${n.toFixed(2)}%`;
    }
    function fmtNum(v) {
      if (v == null || isNaN(v)) return '—';
      const n = Number(v);
      if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
    }
    function escapeAttr(s) {
      return String(s == null ? '' : s).replace(/"/g, '&quot;');
    }

    /**
     * Detect which agents executed by inspecting the orchestrator's nested result keys.
     * Falls back to ``parsed.agent`` for stubs / single-agent paths.
     */
    function inferAgentsRan(parsed) {
      const ran = new Set();
      const r = parsed.result || {};
      if (r && typeof r === 'object') {
        if (r.portfolio_health) ran.add('portfolio_health');
        if (r.risk_analysis) ran.add('risk_analysis');
        if (r.market_research) ran.add('market_research');
        if (r.market_news) ran.add('financial_news');
        if (r.report || parsed.agent === 'report_generator') ran.add('report_generator');
      }
      if (!ran.size && parsed.agent && PRIMARY_AGENTS.includes(parsed.agent)) {
        ran.add(parsed.agent);
      }
      return [...ran];
    }

    // ===========================================================
    // Helpers
    // ===========================================================
    function safeJson(s) {
      try { return JSON.parse(s); } catch { return null; }
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(
        /[&<>"']/g,
        c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
      );
    }

    function nowHms() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    // ===========================================================
    // Hardcoded fallback profiles (used only if /users 404s)
    // ===========================================================
    function profileMarcus() {
      return {
        user_id: 'usr_003', name: 'Marcus Webb', age: 35, country: 'US',
        base_currency: 'USD', kyc: { status: 'verified' }, risk_profile: 'moderate',
        positions: [
          { ticker: 'NVDA', exchange: 'NASDAQ', quantity: 180, avg_cost: 218.40, currency: 'USD', purchased_at: '2023-04-12' },
          { ticker: 'AAPL', exchange: 'NASDAQ', quantity: 8, avg_cost: 168.20, currency: 'USD', purchased_at: '2024-05-20' },
        ],
        preferences: { preferred_benchmark: 'S&P 500' },
      };
    }
    function profileAlex() {
      return {
        user_id: 'usr_001', name: 'Alex Chen', age: 28, country: 'US',
        base_currency: 'USD', kyc: { status: 'verified' }, risk_profile: 'aggressive',
        positions: [
          { ticker: 'AAPL', exchange: 'NASDAQ', quantity: 60, avg_cost: 142.30, currency: 'USD', purchased_at: '2023-08-04' },
          { ticker: 'NVDA', exchange: 'NASDAQ', quantity: 35, avg_cost: 412.85, currency: 'USD', purchased_at: '2023-11-15' },
        ],
        preferences: { preferred_benchmark: 'QQQ' },
      };
    }
    function profileJamie() {
      return {
        user_id: 'usr_004', name: 'Jamie Patel', age: 31, country: 'US',
        base_currency: 'USD', kyc: { status: 'verified' }, risk_profile: 'moderate',
        positions: [],
        preferences: { preferred_benchmark: 'S&P 500' },
      };
    }
  </script>
